<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncSchedule Pro | Smart Planner</title>
    <!-- FullCalendar Library -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Main Header -->
        <header class="main-header">
            <div class="brand-group">
                <div class="logo-icon">📅</div>
                <div class="brand-text">
                    <h1>SyncSchedule <span>Pro</span></h1>
                    <p id="dateDisplay">Loading date...</p>
                </div>
            </div>
            
            <div class="header-status">
                <div id="liveClock" class="clock-display">00:00:00</div>
                <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
            </div>
        </header>

        <!-- Quick Entry Panel -->
        <section class="card input-panel glass-effect">
            <div class="controls-grid">
                <div class="input-group flex-2">
                    <label for="eventTitle">Task Name</label>
                    <input type="text" id="eventTitle" placeholder="What's the plan?" autocomplete="off">
                </div>
                <div class="input-group flex-1">
                    <label for="eventCategory">Category</label>
                    <select id="eventCategory">
                        <option value="#4f46e5">🔵 Work</option>
                        <option value="#10b981">🟢 Personal</option>
                        <option value="#f59e0b">🟡 Important</option>
                        <option value="#ef4444">🔴 Urgent</option>
                    </select>
                </div>
                <div class="input-group flex-1">
                    <label for="eventTime">Schedule Time</label>
                    <input type="datetime-local" id="eventTime">
                </div>
                <div class="button-wrapper">
                    <button class="add-btn" onclick="addSchedule()">Add Task</button>
                </div>
            </div>
        </section>

        <!-- Main Layout -->
        <main class="content-layout">
            <!-- Calendar Section -->
            <section class="calendar-section">
                <div class="card calendar-card" style="padding: 15px;">
                    <div id='calendar'></div>
                </div>
            </section>

            <!-- Sidebar Section -->
            <aside class="sidebar-section">
                <!-- Stats Overview -->
                <div class="card stats-card">
                    <h3 style="margin-top: 0;">Overview</h3>
                    <div class="stats-container">
                        <div class="stat-box">
                            <span class="stat-num" id="taskCount">0</span>
                            <span class="stat-desc">Total Tasks</span>
                        </div>
                        <div class="stat-box urgent-border">
                            <span class="stat-num urgent-text" id="urgentCount">0</span>
                            <span class="stat-desc">Urgent</span>
                        </div>
                    </div>
                </div>

                <!-- Task List -->
                <div class="card list-card">
                    <div class="list-header">
                        <h3 style="margin: 0;">Upcoming</h3>
                        <span class="task-badge" id="listCount">0</span>
                    </div>
                    <div id="taskList" class="scroll-list">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-window">
            <div style="font-size: 3rem; margin-bottom: 10px;">⚠️</div>
            <h3>Delete Task?</h3>
            <p style="color: var(--text-muted);">This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
                <button id="confirmBtn" class="btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
